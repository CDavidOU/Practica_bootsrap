<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Gráfica con Bootstrap y Chart.js</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                
                <div class="card shadow">
                    <div class="card-header bg-primary text-white">
                        <h5 class="card-title mb-0">Reporte de Ventas Mensuales</h5>
                    </div>
                    <div class="card-body">
                        
                        <div class="chart-container" style="position: relative; width:100%;">
                            <canvas id="miGrafica"></canvas>
                        </div>

                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <script>
        // Obtenemos la referencia al canvas usando su ID
        const ctx = document.getElementById('miGrafica').getContext('2d');
        
        // Creamos la gráfica
        const miGrafica = new Chart(ctx, {
            type: 'bar', // <- MODIFICA AQUÍ: tipo de gráfica ('line', 'pie', 'doughnut', etc.)
            data: {
                labels: ['Enero', 'Febrero', 'Marzo', 'Abril', 'Mayo'], // <- MODIFICA AQUÍ: Etiquetas del eje X
                datasets: [{
                    label: 'Ventas en USD', // <- MODIFICA AQUÍ: Título de los datos
                    data: [1200, 1900, 3000, 500, 2200], // <- MODIFICA AQUÍ: Los números a graficar
                    backgroundColor: 'rgba(54, 162, 235, 0.5)', // Color de relleno (Bootstrap-ish azul)
                    borderColor: 'rgba(54, 162, 235, 1)', // Color del borde
                    borderWidth: 1
                }]
            },
            options: {
                responsive: true, // Hace que se adapte al tamaño de la pantalla
                scales: {
                    y: {
                        beginAtZero: true // Obliga al eje Y a empezar en 0
                    }
                }
            }
        });
    </script>
</body>
</html>
